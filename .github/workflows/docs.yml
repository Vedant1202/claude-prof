name: Deploy docs

# Builds the Docusaurus site and deploys it to GitHub Pages.
# Pull requests build only (validation); pushes to main and manual runs deploy.
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "website/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Permissions GITHUB_TOKEN needs to publish a Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight Pages deployment at a time; don't cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build docs
        run: corepack pnpm --filter @cprof/docs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    # Don't deploy on pull requests — build-only validation there.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
